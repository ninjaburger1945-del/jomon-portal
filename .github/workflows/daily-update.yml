name: "Daily Autopilot: Jomon Explorer"

on:
  schedule:
    - cron: '37 8 * * *'   # 日本時間 毎日 17:37
  workflow_dispatch:      # 手動実行ボタンを有効化

jobs:
  explore-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      pages: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install @google/generative-ai@latest
          npm install sharp # ✅ 画像リサイズに必要なので追加

      - name: Verify API Key and Environment
        run: |
          if [ -z "$GEMINI_API_KEY20261336" ]; then
            echo "❌ ERROR: GEMINI_API_KEY20261336 is not set"
            exit 1
          fi
          echo "✓ Gemini API key configured"
          
          # ✅ Google検索の鍵もチェックするように追加
          if [ -z "$GOOGLESEARCH_SERVICE_ACCOUNT" ]; then
            echo "❌ ERROR: GOOGLESEARCH_SERVICE_ACCOUNT is not set"
            exit 1
          fi
          if [ -z "$GOOGLESEARCH_CX" ]; then
            echo "❌ ERROR: GOOGLESEARCH_CX is not set"
            exit 1
          fi
          echo "✓ Google Search API keys configured"
        env:
          GEMINI_API_KEY20261336: ${{ secrets.GEMINI_API_KEY20261336 }}
          GOOGLESEARCH_SERVICE_ACCOUNT: ${{ secrets.GOOGLESEARCH_SERVICE_ACCOUNT }}
          GOOGLESEARCH_CX: ${{ secrets.GOOGLESEARCH_CX }}

      - name: AI Crawler - Find 1 New Facilities
        timeout-minutes: 45
        run: |
          echo "[CRAWLER] Starting crawler (timeout: 45min)"
          node scripts/daily-crawler.js
        env:
          # ✅ ここが運命の分かれ道！Googleの鍵をプログラムに渡します
          GEMINI_API_KEY20261336: ${{ secrets.GEMINI_API_KEY20261336 }}
          GOOGLESEARCH_SERVICE_ACCOUNT: ${{ secrets.GOOGLESEARCH_SERVICE_ACCOUNT }}
          GOOGLESEARCH_CX: ${{ secrets.GOOGLESEARCH_CX }}

      - name: Commit and Push Database and Image Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app/data/facilities.json
          git add public/images/facilities/

          STATUS=$(git status --porcelain)
          if [[ -n "$STATUS" ]]; then
            git commit -m "chore(data): auto-added new Jomon facility and AI image [skip ci]"
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "[GIT] No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Build
        run: npm run build
