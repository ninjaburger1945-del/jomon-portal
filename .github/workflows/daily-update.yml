name: "Daily Autopilot: Jomon Explorer"

on:
  schedule:
    - cron: '0 8 * * *'   # 日本時間 毎日 17:00 (UTC 08:00)
  workflow_dispatch:      # 手動実行ボタンを有効化

jobs:
  explore-and-deploy:
    runs-on: ubuntu-latest
    
    # 権限を明示的に「書き込み許可」に設定
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      pages: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install @google/generative-ai@latest

      - name: AI Crawler - Find 1 New Facilities
        timeout-minutes: 45
        run: |
          echo "[CRAWLER] Starting crawler (timeout: 45min)"
          node scripts/daily-crawler.js
          CRAWLER_EXIT=$?
          echo "[CRAWLER] Exit code: $CRAWLER_EXIT"
          if [ $CRAWLER_EXIT -eq 0 ]; then
            echo "[CRAWLER] ✓ Crawler completed successfully"
          else
            echo "[CRAWLER] ⚠️  Crawler exited with code $CRAWLER_EXIT"
          fi
          exit $CRAWLER_EXIT
        env:
          GEMINI_API_KEY: ${{ secrets.JOMON_GITHUB_TOKEN }}

      - name: Commit and Push Database and Image Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config core.hooksPath .githooks
          git add app/data/facilities.json
          git add public/images/facilities/

          STATUS=$(git status --porcelain app/data/facilities.json public/images/facilities/)
          if [[ -n "$STATUS" ]]; then
            echo "[GIT] Detected changes:"
            echo "$STATUS"
            git commit -m "chore(data): auto-added new Jomon facility and AI image [skip ci]"
            if git push origin main; then
              echo "[GIT] ✓ Successfully pushed to main"
            else
              echo "[GIT] ✗ Push failed - checking for conflicts..."
              git log -1 --oneline
              exit 1
            fi
          else
            echo "[GIT] No changes to commit"
          fi

      - name: Build
        run: npm run build

      - name: Trigger Vercel ISR Cache Invalidation
        run: |
          # GitHub API で Vercel に ISR リベーク信号を送信（facilities.json 更新を通知）
          # Vercel は git push を検知して自動デプロイするため、ここではスキップ
          echo "ISR will be triggered automatically by Vercel on git push" 
