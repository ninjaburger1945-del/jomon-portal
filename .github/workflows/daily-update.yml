name: "Daily Autopilot: Jomon Explorer"

on:
  schedule:
    - cron: '48 22 * * *'  # 日本時間 毎日 午前 7:48
  workflow_dispatch:      # 手動実行ボタンを有効化

jobs:
  explore-and-deploy:
    runs-on: ubuntu-latest
    
    # 権限を明示的に「書き込み許可」に設定
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 過去の履歴を含め全データを確実に取得

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install @google/generative-ai@latest

      - name: Run AI Crawler
        run: node scripts/daily-crawler.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add facilities.json
          # 変更がある場合のみコミットしてプッシュ
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Jomon facilities data [skip ci]" && git push origin main)

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: jomon-portal
