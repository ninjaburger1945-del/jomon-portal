name: "Daily Autopilot: Jomon Explorer"

on:
  schedule:
    - cron: '48 22 * * *' # 毎日日本時間 7:48
  workflow_dispatch: # 手動実行ボタン

jobs:
  explore-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み権限を明示

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install @google/generative-ai@latest

      - name: Run AI Crawler
        run: node scripts/daily-crawler.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 生成された facilities.json をリポジトリにコミットする
      # git add . にすることで、新規ファイル作成時のエラーを回避します
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Jomon facilities data" && git push)

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: jomon-portal
