name: "Daily Autopilot: Jomon Explorer"

on:
  schedule:
    - cron: '0 1 * * *'  # 日本時間 毎日 午前 10:00 (UTC 01:00)
  workflow_dispatch:      # 手動実行ボタンを有効化

jobs:
  explore-and-deploy:
    runs-on: ubuntu-latest
    
    # 権限を明示的に「書き込み許可」に設定
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install @google/generative-ai@latest

      - name: AI Crawler - Find 1 New Facilities
        run: node scripts/daily-crawler.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Push Database and Image Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app/data/facilities.json
          git add public/images/facilities/
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(data): auto-added new Jomon facility and AI image [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: jomon-portal 
