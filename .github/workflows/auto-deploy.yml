name: ConoHa Auto Deploy & Remaster

on:
  schedule:
    # クローラー実行後デプロイ（毎日 1:00 AM JST = UTC 16:00前日）
    - cron: '0 16 * * *'
    # 週末イラスト処理後デプロイ（毎週土曜 5:00 AM JST = UTC 20:00前日金曜）
    - cron: '0 20 * * 5'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to ConoHa
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CONOHA_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa ${{ secrets.CONOHA_SERVER_IP }} >> ~/.ssh/known_hosts 2>&1

          ssh ${{ secrets.CONOHA_USER }}@${{ secrets.CONOHA_SERVER_IP }} << 'DEPLOY_EOF'
          set -e
          cd ~/jomon-portal
          echo "[DEPLOY] Git pull..."
          git pull origin main
          echo "[DEPLOY] npm install..."
          npm install --legacy-peer-deps
          echo "[DEPLOY] npm run build..."
          npm run build
          echo "[DEPLOY] pm2 restart..."
          pm2 restart jomon-web || pm2 start ecosystem.config.js --only jomon-web
          pm2 save
          echo "[DEPLOY] ✅ Deployment complete"
          DEPLOY_EOF

      - name: Verify Deploy
        run: |
          ssh ${{ secrets.CONOHA_USER }}@${{ secrets.CONOHA_SERVER_IP }} "pm2 status"
