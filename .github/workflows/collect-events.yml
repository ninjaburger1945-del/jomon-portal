name: Collect Jomon Events

on:
  schedule:
    # 毎週日曜 0:00 UTC = 毎週日曜 9:00 JST
    - cron: '0 0 * * 0'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install cheerio axios @google/generative-ai @octokit/rest

      - name: Run event collector
        run: node scripts/collect-events.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY20261336 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if git diff --quiet app/data/events.json; then
            echo "No changes to events.json"
          else
            echo "Changes detected in events.json"
            git add app/data/events.json
            git commit -m "chore(events): update events from auto-collection"
            git push
          fi
