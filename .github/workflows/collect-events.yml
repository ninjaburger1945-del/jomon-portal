name: Collect Jomon Events

on:
  schedule:
    # 毎週日曜 0:00 UTC = 毎週日曜 9:00 JST
    - cron: '0 0 * * 0'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install cheerio axios @google/generative-ai @octokit/rest

      - name: Run event collector
        run: node scripts/collect-events.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY20261336 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # イベント情報のみの更新時はビルドをスキップ
          # Vercel への負荷軽減: SKIP_CI=true で [skip ci] をコミットメッセージに追加
          SKIP_CI: true

      # コミット＆プッシュはスクリプト内で一括実行
      # git push を1回に統一してVercelビルド回数を削減
