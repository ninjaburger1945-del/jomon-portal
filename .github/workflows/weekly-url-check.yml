name: "Weekly URL Health Check"

on:
  schedule:
    - cron: '0 1 * * 1'  # 毎週月曜日 日本時間 10:00 (UTC 01:00)
  workflow_dispatch:      # 手動実行ボタンを有効化

jobs:
  check-urls:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate placeholder URLs
        run: node scripts/validate_urls.js

      - name: Check all URLs (HTTP health)
        id: url_check
        run: |
          node scripts/check-links-fetch.js 2>&1 | tee url_check_result.txt
          if grep -q "\[DEAD/ERROR\]\|\[NO_URL\]" url_check_result.txt; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue on failure
        if: steps.url_check.outputs.has_errors == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('url_check_result.txt', 'utf-8');
            const deadLines = result.split('\n').filter(l =>
              l.includes('[DEAD/ERROR]') || l.includes('[NO_URL]')
            );
            const body = [
              '## ⚠️ リンク切れが検出されました',
              '',
              `実行日時: ${new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' })}`,
              '',
              '### 問題のある施設',
              '```',
              deadLines.join('\n'),
              '```',
              '',
              '`app/data/facilities.json` の該当 `url` フィールドを正しいURLに修正してください。',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'url-health',
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
              console.log(`Commented on existing issue #${issues[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔗 リンク切れ検出 (${new Date().toISOString().slice(0, 10)})`,
                body,
                labels: ['url-health'],
              });
              console.log('Created new issue.');
            }

      - name: All URLs OK
        if: steps.url_check.outputs.has_errors == 'false'
        run: echo "✅ 全URLの生存確認が完了しました。問題はありません。"
