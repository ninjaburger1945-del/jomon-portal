<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- グラデーション定義 -->
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="32" height="32" fill="#2C2416" rx="4"/>

  <!-- 円形シールド（サバイバル感） -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#8B7355" stroke-width="1.2" opacity="0.6"/>
  <circle cx="16" cy="16" r="13" fill="none" stroke="#C8A040" stroke-width="0.5" opacity="0.4"/>

  <!-- 矢尻：黒曜石の光沢 -->
  <!-- メイン矢（上向き） -->
  <path d="M 16 4 L 22 18 L 16 15 L 10 18 Z" fill="url(#arrowGrad)" stroke="#FFFFFF" stroke-width="0.6" opacity="0.8"/>

  <!-- 矢の先端：鋭いハイライト -->
  <line x1="15.5" y1="4.5" x2="16.5" y2="4.5" stroke="#FFFFFF" stroke-width="0.4" opacity="0.9"/>

  <!-- 矢の側面ハイライト（右側） -->
  <path d="M 16 4 L 20 16" fill="none" stroke="#FFFFFF" stroke-width="0.4" opacity="0.5"/>

  <!-- 矢の側面シャドウ（左側） -->
  <path d="M 16 4 L 12 16" fill="none" stroke="#000000" stroke-width="0.4" opacity="0.6"/>

  <!-- 矢の柄部分：テクスチャ -->
  <rect x="14.5" y="16" width="3" height="10" fill="#1A1A1A" stroke="#8B7355" stroke-width="0.4"/>
  <line x1="15" y1="18" x2="17" y2="18" stroke="#C8A040" stroke-width="0.2" opacity="0.4"/>
  <line x1="15" y1="22" x2="17" y2="22" stroke="#C8A040" stroke-width="0.2" opacity="0.4"/>
  <line x1="15" y1="26" x2="17" y2="26" stroke="#C8A040" stroke-width="0.2" opacity="0.4"/>
</svg>