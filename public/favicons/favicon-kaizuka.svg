<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- グラデーション定義 -->
  <defs>
    <radialGradient id="kaizukaGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B4965;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="32" height="32" fill="url(#kaizukaGrad)" rx="4"/>

  <!-- 同心円（貝殻の重なり） -->
  <!-- 中心：小さな貝 -->
  <ellipse cx="16" cy="16" rx="2" ry="3" fill="#D4AF37" opacity="0.9"/>

  <!-- 層1 -->
  <circle cx="16" cy="16" r="5" fill="none" stroke="#D4AF37" stroke-width="0.6" opacity="0.8"/>

  <!-- 層2 -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#C8A040" stroke-width="0.5" opacity="0.6"/>

  <!-- 層3 -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.4"/>

  <!-- 層4（外枠） -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#9B7653" stroke-width="0.5" opacity="0.3"/>

  <!-- 放射状の層テクスチャ -->
  <line x1="16" y1="2" x2="16" y2="5" stroke="#D4AF37" stroke-width="0.4" opacity="0.5"/>
  <line x1="26" y1="16" x2="23" y2="16" stroke="#D4AF37" stroke-width="0.4" opacity="0.5"/>
  <line x1="16" y1="30" x2="16" y2="27" stroke="#D4AF37" stroke-width="0.4" opacity="0.5"/>
  <line x1="6" y1="16" x2="9" y2="16" stroke="#D4AF37" stroke-width="0.4" opacity="0.5"/>

  <!-- 対角線上の層 -->
  <line x1="24" y1="8" x2="21.5" y2="10.5" stroke="#C8A040" stroke-width="0.4" opacity="0.4"/>
  <line x1="8" y1="24" x2="10.5" y2="21.5" stroke="#C8A040" stroke-width="0.4" opacity="0.4"/>
</svg>