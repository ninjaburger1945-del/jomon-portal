<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景 -->
  <rect width="32" height="32" fill="#704828" rx="4"/>

  <!-- 土偶シルエット：火炎型 -->
  <!-- 頭部：大きな目 -->
  <ellipse cx="16" cy="7" rx="5" ry="6" fill="none" stroke="#C8A040" stroke-width="1.2"/>

  <!-- 口：横線 -->
  <line x1="13" y1="11" x2="19" y2="11" stroke="#C8A040" stroke-width="0.8"/>

  <!-- 体：火炎曲線（左側） -->
  <path d="M 11 12 Q 8 14 9 19 Q 8 24 12 28" fill="none" stroke="#C8A040" stroke-width="1"/>

  <!-- 体：火炎曲線（右側） -->
  <path d="M 21 12 Q 24 14 23 19 Q 24 24 20 28" fill="none" stroke="#C8A040" stroke-width="1"/>

  <!-- 胸部：波状装飾 -->
  <path d="M 13 14 Q 16 16 19 14" fill="none" stroke="#C8A040" stroke-width="0.8" opacity="0.7"/>
  <path d="M 12 17 Q 16 19 20 17" fill="none" stroke="#C8A040" stroke-width="0.8" opacity="0.7"/>

  <!-- 脚部：左右 -->
  <rect x="10" y="26" width="2" height="4" fill="#C8A040" rx="1"/>
  <rect x="20" y="26" width="2" height="4" fill="#C8A040" rx="1"/>
</svg>